services:
  oracle-log-exporter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oracle-log-exporter
    env_file:
      - .env
    volumes:
      - ./output:/app/output
      - ./state:/app/state
    logging:
      driver: json-file
      options:
        max-size: ${DOCKER_LOG_MAX_SIZE:-10m}
        max-file: ${DOCKER_LOG_MAX_FILE:-5}
    restart: unless-stopped
